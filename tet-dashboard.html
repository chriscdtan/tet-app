    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: #f4f7f9; -webkit-tap-highlight-color: transparent; }
        
        /* Scrollbar Styling */
        .custom-scroll::-webkit-scrollbar { height: 8px; width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; border: 2px solid #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Accordion Styles */
        details > summary { list-style: none; cursor: pointer; transition: all 0.2s; }
        details > summary::-webkit-details-marker { display: none; }
        details > summary::after { content: '+'; float: right; font-weight: 800; font-size: 1.2em; color: #94a3b8; transition: transform 0.3s ease; }
        details[open] > summary::after { content: '−'; color: #4f46e5; transform: rotate(180deg); }

        /* Animation for pulse */
        @keyframes subtle-pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .urgent-pulse { animation: subtle-pulse 2s infinite; }
        
        /* Disabled Card Transitions */
        .card-disabled { filter: grayscale(100%); opacity: 0.65; background-color: #f8fafc !important; border-color: #e2e8f0 !important; }

        /* 3D Realistic Neumorphic Toggle */
        .switch-3d {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 28px;
            margin: 4px 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .switch-3d input { display: none; }

        .switch-3d-track {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #e2e8f0;
            border-radius: 15px;
            box-shadow: 
                inset 0 3px 5px rgba(0,0,0,0.15),
                inset 0 -1px 2px rgba(255,255,255,0.8),
                0 1px 2px rgba(255,255,255,0.8);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }
        .switch-3d input:checked ~ .switch-3d-track {
            background: #0ea5e9;
            box-shadow: 
                inset 0 3px 6px rgba(0,100,120,0.3),
                inset 0 -1px 2px rgba(255,255,255,0.5),
                0 1px 2px rgba(255,255,255,0.8);
        }

        .switch-3d-text-on, .switch-3d-text-off {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            font-weight: 800;
            transition: opacity 0.3s ease;
        }
        .switch-3d-text-on { left: 10px; color: #0284c7; text-shadow: 0 1px 1px rgba(255,255,255,0.4); opacity: 0; }
        .switch-3d-text-off { right: 8px; color: #94a3b8; text-shadow: 0 1px 1px rgba(255,255,255,0.8); opacity: 1; }
        .switch-3d input:checked ~ .switch-3d-track .switch-3d-text-on { opacity: 1; }
        .switch-3d input:checked ~ .switch-3d-track .switch-3d-text-off { opacity: 0; }

        .switch-3d-thumb {
            position: absolute;
            top: -3px; left: -2px;
            width: 34px; height: 34px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #f1f5f9 30%, #cbd5e1 80%, #94a3b8 100%);
            box-shadow: 
                2px 0 5px rgba(0,0,0,0.15),
                0 4px 6px rgba(0,0,0,0.2),
                inset 0 2px 3px rgba(255,255,255,0.9),
                inset 0 -2px 3px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; align-items: center; justify-content: center; z-index: 2;
        }
        .switch-3d input:checked ~ .switch-3d-thumb {
            transform: translateX(30px);
            box-shadow: 
                -2px 0 5px rgba(0,0,0,0.15),
                0 4px 6px rgba(0,0,0,0.2),
                inset 0 2px 3px rgba(255,255,255,0.9),
                inset 0 -2px 3px rgba(0,0,0,0.1);
        }

        .switch-3d-ridges { display: flex; gap: 3px; }
        .switch-3d-ridges span {
            width: 2px; height: 10px; border-radius: 1px;
            background: #94a3b8;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.8);
            transition: all 0.4s ease;
        }
        .switch-3d input:checked ~ .switch-3d-thumb .switch-3d-ridges span {
            background: #38bdf8;
            box-shadow: 0 0 5px #38bdf8, inset 0 1px 1px rgba(255,255,255,0.8);
        }

        .text-glass {
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

        let isProjectionEnabled = localStorage.getItem(DASHBOARD_PROJECTION_KEY) === 'true'; // Default false for strict saved data
        
        let ecosystemChart = null;
        let processedProfiles = [];

        const nodeDefinitions = [

                no_data_title: 'No Profiles Found', no_data_desc: 'The Dashboard needs data to analyze. Please save your profiles in TET Node Calculator or Profit Simulator first.', refresh: 'Refresh Data',
                combined_chart: 'Combined Production Trend (60 Days)', account_health: 'Account Health Status',
                rescue_strategy: 'Cross-Account Rescue Strategy', shortage_detected: 'Shortage Risk Detected',
                status_safe: 'Healthy', status_danger: 'Risk', status_disabled: 'Excluded', toggle_monitor: 'Include/Exclude from Dashboard',

                rescue_req: '⚠️ <span class="font-black text-rose-700">{name}</span> <span class="text-slate-600 font-medium ml-1">Needs {amt} TET <span class="text-slate-400 text-xs">({day})</span></span>',
                rescue_action: 'Action: Transfer <strong class="text-indigo-600 bg-indigo-50 px-1 rounded">{amt} TET</strong> from <strong class="text-emerald-600 bg-emerald-50 px-1 rounded">{src}</strong> to <strong class="text-rose-600 bg-rose-50 px-1 rounded">{target}</strong>.',

                projected_days: 'Est. +{d}d'

        function t(key) { return i18n[currentLang][key] || key; }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem(LANG_KEY, currentLang);
            applyLanguage();
            renderAccountGrid();
            renderDashboardGlobals();
        }

        function applyLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerHTML = t(el.getAttribute('data-i18n')));
            document.getElementById('langBtnText').innerText = currentLang === 'zh' ? 'EN' : '中文';
        }

        function truncateTo2(num) {
            return Math.floor(num * 100) / 100;
        }

        // --- CORE ENGINE ---

        function initApp() {
            applyLanguage();
            
            const pToggle = document.getElementById('globalProjectionToggle');
            pToggle.checked = isProjectionEnabled;

            loadAndProcessData();
        }

        window.toggleGlobalProjection = function(enabled) {
            isProjectionEnabled = enabled;
            localStorage.setItem(DASHBOARD_PROJECTION_KEY, enabled);
            
            loadAndProcessData();
        }

        window.toggleProfile = function(profileName, checkboxElement) {
            if (disabledProfiles.includes(profileName)) {
                disabledProfiles = disabledProfiles.filter(n => n !== profileName);
            } else {
                disabledProfiles.push(profileName);
            }
            localStorage.setItem(DISABLED_PROFILES_KEY, JSON.stringify(disabledProfiles));

            let p = processedProfiles.find(x => x.name === profileName);
            if (p) p.isEnabled = !disabledProfiles.includes(profileName);

            if (checkboxElement) {
                const card = checkboxElement.closest('.profile-card');
                const isEnabled = checkboxElement.checked;
                
                if (isEnabled) {
                    card.classList.remove('card-disabled');
                    card.classList.add('bg-white');
                    card.querySelector('.badge-enabled').classList.remove('hidden');
                    card.querySelector('.badge-disabled').classList.add('hidden');
                    const valueEl = card.querySelector('.card-value');
                    valueEl.classList.remove('text-slate-400');
                    valueEl.classList.add(card.dataset.activeColor);
                    const decorEl = card.querySelector('.card-corner-decor');
                    if (decorEl) decorEl.classList.remove('opacity-0');
                } else {
                    card.classList.add('card-disabled');
                    card.classList.remove('bg-white');
                    card.querySelector('.badge-enabled').classList.add('hidden');
                    card.querySelector('.badge-disabled').classList.remove('hidden');
                    const valueEl = card.querySelector('.card-value');
                    valueEl.classList.remove(card.dataset.activeColor);
                    valueEl.classList.add('text-slate-400');
                    const decorEl = card.querySelector('.card-corner-decor');
                    if (decorEl) decorEl.classList.add('opacity-0');
                }
            }

            renderDashboardGlobals();
        }

        function getCalendarDaysPassed(ts1, ts2) {
            const d1 = new Date(ts1);
            const d2 = new Date(ts2);
            // Ignore timezones and hours - strictly calculate midnight UTC boundaries
            const utc1 = Date.UTC(d1.getFullYear(), d1.getMonth(), d1.getDate());
            const utc2 = Date.UTC(d2.getFullYear(), d2.getMonth(), d2.getDate());
            return Math.floor((utc2 - utc1) / (1000 * 60 * 60 * 24));
        }

        function loadAndProcessData() {
            const raw = localStorage.getItem(PROFILES_KEY);
            let parsed = raw ? JSON.parse(raw) : {};

            let profilesMap = {};
            if (Array.isArray(parsed)) {
                parsed.forEach(p => { if (p && p.name) profilesMap[p.name] = p; });
                localStorage.setItem(PROFILES_KEY, JSON.stringify(profilesMap)); 
            } else {
                profilesMap = parsed;
            }

            let profiles = Object.values(profilesMap).filter(p => !p.deleted);

            if (profiles.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            document.getElementById('emptyState').classList.add('hidden');
            const dashboard = document.getElementById('dashboardContent');
            dashboard.classList.remove('hidden');

            processedProfiles = [];

            profiles.forEach(p => {
                let data = JSON.parse(JSON.stringify(p.data)); 
                let daysPassed = 0;
                
                if (isProjectionEnabled && p.timestamp && data.nodes) {
                    daysPassed = Math.max(0, getCalendarDaysPassed(p.timestamp, Date.now()));
                }

                // Simulate using Realistic Ledger Engine
                const simResult = simulateProfile(data, daysPassed);
                
                processedProfiles.push({
                    name: p.name,
                    isEnabled: !disabledProfiles.includes(p.name),
                    rawAccel: parseFloat(data.accel) || 0,
                    rawWallet: simResult.walletNow, // Dynamically fast-forwarded wallet balance
                    safeAmt: simResult.safe,
                    shortageAmt: simResult.shortage,
                    shortageDay: simResult.shortageDay,
                    dailyWallets: simResult.dailyWallets,
                    timestamp: p.timestamp,
                    date: p.date,
                    daysProjected: daysPassed
                });
            });

            setTimeout(() => { dashboard.classList.remove('opacity-0'); }, 50);

            renderAccountGrid();
            renderDashboardGlobals();
        }

        function simulateProfile(data, daysPassed = 0) {
            const accel = parseFloat(data.accel) || 0;
            const startWallet = parseFloat(data.wallet) || 0;
            const globalCycle = parseInt(data.globalCycle) || 55;
            
            let nodes = [];
            nodeDefinitions.forEach(def => {
                if (data.nodes && data.nodes[def.id]) {
                    let nd = data.nodes[def.id];
                    let isActive = nd.a;
                    let autoRestake = nd.r;
                    let c = parseFloat(nd.c) || 55;
                    let h = parseFloat(nd.h) || 0;
                    
                    let o = 0;
                    if (nd.o !== '' && nd.o !== undefined && nd.o !== null) {
                        o = parseFloat(nd.o);
                    } else {
                        let baseRate = truncateTo2(def.reward / c);
                        o = baseRate * h;
                    }

                    nodes.push({ 
                        def: def, 
                        o: o, 
                        currentCycle: c, 
                        h: h, 
                        active: isActive, 
                        autoRestake: autoRestake, 
                        waiting: false,
                        dead: !isActive 
                    });
                }
            });

            let currentWallet = startWallet;
            
            let futureShortage = 0;
            let futureShortageDay = null;

            function runOneDay(dayIndex, isFuture) {
                let dailyProd = 0;
                let dailyAccelRemaining = accel;

                nodes.forEach(node => {
                    if (node.active && !node.dead && !node.waiting) { 
                        node.h += 1;
                        let baseRate = truncateTo2(node.def.reward / node.currentCycle);
                        
                        if (node.h >= node.currentCycle) {
                            let naturalRemaining = node.def.reward - node.o;
                            if (naturalRemaining > baseRate) {
                                baseRate = naturalRemaining; 
                            }
                        }

                        let potentialProd = baseRate + dailyAccelRemaining;
                        let remainingCapacity = Math.max(0, node.def.reward - node.o);
                        let nodeProd = 0;

                        if (remainingCapacity <= potentialProd) {
                            nodeProd = remainingCapacity;
                            let neededAccel = Math.max(0, remainingCapacity - baseRate);
                            dailyAccelRemaining -= neededAccel;
                            dailyAccelRemaining = Math.max(0, dailyAccelRemaining);
                        } else {
                            nodeProd = potentialProd;
                            dailyAccelRemaining = 0; 
                        }

                        node.o += nodeProd;
                        dailyProd += nodeProd;

                        if (node.o >= node.def.reward - 0.001 || node.h >= node.currentCycle) {
                            node.active = false;
                            if (node.autoRestake) {
                                node.waiting = true; 
                            } else {
                                node.dead = true;
                            }
                        }
                    }
                });

                currentWallet += dailyProd;
                
                nodes.forEach(node => {
                    if (node.waiting) {
                        if (isFuture && currentWallet < node.def.cost) {
                            let missing = node.def.cost - currentWallet;
                            if (futureShortage === 0) { 
                                futureShortage = missing;
                                futureShortageDay = dayIndex;
                            }
                        }

                        if (currentWallet >= node.def.cost) {
                            currentWallet -= node.def.cost;
                            node.active = true;
                            node.waiting = false;
                            node.o = 0; 
                            node.h = 0; 
                            node.currentCycle = Math.min(120, node.currentCycle + 5);
                        }
                    }
                });
            }

            for (let fd = 1; fd <= daysPassed; fd++) {
                runOneDay(fd, false);
            }

            let walletNow = currentWallet; 
            let lowestWalletPoint = currentWallet;
            let dailyWallets = [];

            for (let d = 1; d <= 60; d++) {
                runOneDay(d, true);
                if (currentWallet < lowestWalletPoint) lowestWalletPoint = currentWallet;
                dailyWallets.push(currentWallet);
            }

            return {
                safe: futureShortage === 0 ? lowestWalletPoint : 0,
                shortage: futureShortage,
                shortageDay: futureShortageDay,
                dailyWallets: dailyWallets,
                walletNow: walletNow 
            };
        }

        function renderDashboardGlobals() {
            let totalSafe = 0;
            let totalShortage = 0;
            let totalStartWallet = 0;
            let totalAccel = 0;
            let combinedChartData = new Array(60).fill(0);

            let surplusAccounts = [];
            let shortageAccounts = [];
            let hasOutdatedProfiles = false;
            let activeCount = 0;

            processedProfiles.forEach(p => {
                if (p.isEnabled) {
                    totalSafe += p.safeAmt;
                    totalShortage += p.shortageAmt;
                    totalStartWallet += p.rawWallet;
                    totalAccel += p.rawAccel;
                    activeCount++;

                    if (p.safeAmt > 0) surplusAccounts.push({ name: p.name, amt: p.safeAmt });
                    if (p.shortageAmt > 0) shortageAccounts.push({ name: p.name, amt: p.shortageAmt, day: p.shortageDay });

                    for(let i=0; i<60; i++) {
                        combinedChartData[i] += p.dailyWallets[i];
                    }
                }

                if (p.timestamp) {
                    if ((Date.now() - p.timestamp) > (24 * 60 * 60 * 1000)) hasOutdatedProfiles = true;
                } else {
                    let today = new Date().toLocaleDateString();
                    if (!(p.date || '').includes(today)) hasOutdatedProfiles = true;
                }
            });

            if (hasOutdatedProfiles) {
                document.getElementById('globalWarningBanner').classList.remove('hidden');
            } else {
                document.getElementById('globalWarningBanner').classList.add('hidden');
            }

            document.getElementById('heroTotalSafe').innerText = totalSafe.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('heroCurrentWallet').innerText = totalStartWallet.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('heroTotalAccel').innerText = totalAccel.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('activeAccountsCount').innerText = activeCount;
            
            let indicator = document.getElementById('heroPulseIndicator');
            let ring = document.getElementById('heroPulseRing');
            if (activeCount > 0) { 
                indicator.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-400"; 
                ring.classList.remove('hidden');
            } else { 
                indicator.className = "relative inline-flex rounded-full h-3 w-3 bg-slate-500"; 
                ring.classList.add('hidden');
            }

            renderRescueStrategy(surplusAccounts, shortageAccounts);
            renderChart(combinedChartData);
        }

        function renderAccountGrid() {
            const grid = document.getElementById('accountsGrid');
            grid.innerHTML = ''; 

            processedProfiles.forEach(p => {
                const isSafe = p.shortageAmt === 0;
                const isEnabled = p.isEnabled;
                
                let valueLabel = isSafe ? t('safe_sell') : t('shortage_lbl');
                let activeColorClass = isSafe ? 'text-emerald-500' : 'text-rose-500';
                let valueColor = isEnabled ? activeColorClass : 'text-slate-400';
                let valueAmt = isSafe ? p.safeAmt : p.shortageAmt;
                let dayNote = (!isSafe && isEnabled) ? `<span class="text-[10px] text-rose-500 font-bold ml-2 py-0.5 px-2 rounded bg-rose-50 border border-rose-100 self-center">${t('shortage_at_day').replace('{d}', p.shortageDay)}</span>` : '';

                let projectionBadge = (p.daysProjected > 0) ? `<span class="ml-2 bg-indigo-50 text-indigo-600 text-[10px] px-2 py-0.5 rounded border border-indigo-100 font-bold tracking-normal whitespace-nowrap align-middle" title="Fast-forwarded ${p.daysProjected} days">${t('projected_days').replace('{d}', p.daysProjected)}</span>` : '';

                let savedDate = p.date || '-';
                let isOutdated = false;
                if (p.timestamp) {
                    isOutdated = (Date.now() - p.timestamp) > (24 * 60 * 60 * 1000);
                } else {
                    let today = new Date().toLocaleDateString();
                    if (!savedDate.includes(today)) isOutdated = true;
                }
                
                let outdatedHTML = (isOutdated) ? `
                    <div class="mt-3 bg-rose-50 border border-rose-200 text-rose-600 text-[11px] font-bold px-3 py-2 rounded-lg text-center flex justify-center items-center shadow-sm urgent-pulse">
                        ${t('outdated')}
                    </div>
                ` : '';

                let dateHTML = `
                    <div class="mt-4 pt-3 border-t border-slate-100 flex flex-col justify-between text-xs text-slate-400 font-medium">
                        <div class="flex justify-between items-center w-full">
                            <span class="flex items-center gap-1.5">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ${t('saved_date').replace('{date}', savedDate)}
                            </span>
                        </div>
                        ${outdatedHTML}
                    </div>
                `;

                let bgClasses = isEnabled ? 'bg-white border-slate-200/80 hover:border-indigo-300 hover:shadow-lg hover:-translate-y-0.5' : 'card-disabled';

                let html = `
                    <div class="profile-card ${bgClasses} border rounded-3xl p-5 md:p-6 shadow-sm transition-all duration-300 relative overflow-hidden group flex flex-col" data-active-color="${activeColorClass}">
                        <div class="card-corner-decor absolute top-0 right-0 w-20 h-20 bg-gradient-to-bl from-indigo-50 to-transparent opacity-0 transition-opacity duration-500 group-hover:opacity-100 rounded-bl-[3rem] pointer-events-none ${isEnabled ? '' : 'hidden'}"></div>
                        
                        <div class="flex justify-between items-start mb-4 relative z-10">
                            <div class="flex-1 pr-3">
                                <h4 class="font-black text-slate-800 text-lg md:text-xl tracking-tight flex items-center flex-wrap gap-y-1">
                                    <span class="truncate max-w-full">${p.name}</span>
                                    ${projectionBadge}
                                </h4>
                                
                                <div class="mt-1.5">
                                    <div class="badge-enabled ${isEnabled ? '' : 'hidden'}">
                                        ${isSafe 
                                            ? `<span class="bg-emerald-100/80 text-emerald-700 text-[10px] px-2.5 py-1 rounded-md font-bold uppercase tracking-widest border border-emerald-200/50">${t('status_safe')}</span>`
                                            : `<span class="bg-rose-100/80 text-rose-700 text-[10px] px-2.5 py-1 rounded-md font-bold uppercase tracking-widest border border-rose-200/50 urgent-pulse">${t('status_danger')}</span>`
                                        }
                                    </div>
                                    <div class="badge-disabled ${isEnabled ? 'hidden' : ''}">
                                        <span class="bg-slate-100 text-slate-500 text-[10px] px-2.5 py-1 rounded-md font-bold uppercase tracking-widest border border-slate-200">${t('status_disabled')}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-col items-end gap-1.5 min-w-[65px] pt-1">
                                <label class="switch-3d scale-90 md:scale-100 origin-top-right" title="${t('toggle_monitor')}">
                                    <input type="checkbox" ${isEnabled ? 'checked' : ''} onchange="toggleProfile('${p.name.replace(/'/g, "\\'")}', this)">
                                    <div class="switch-3d-track">
                                        <span class="switch-3d-text-on">ON</span>
                                        <span class="switch-3d-text-off">OFF</span>
                                    </div>
                                    <div class="switch-3d-thumb">
                                        <div class="switch-3d-ridges">
                                            <span></span><span></span><span></span>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="relative z-10 mb-2">
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">${valueLabel}</p>
                            <div class="flex items-baseline flex-wrap gap-1">
                                <p class="card-value text-2xl md:text-3xl font-black ${valueColor} tracking-tighter transition-colors duration-300 drop-shadow-sm truncate max-w-full">${valueAmt.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                                ${dayNote}
                            </div>
                        </div>
                        
                        <div class="mt-auto">
                            ${dateHTML}
                        </div>
                    </div>
                `;
                grid.innerHTML += html;
            });
        }

        function renderRescueStrategy(surplusList, shortageList) {
            const section = document.getElementById('rescueSection');
            const container = document.getElementById('rescueSuggestionsContainer');
            
            if (shortageList.length === 0) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            document.getElementById('rescueTotalShortage').innerText = shortageList.reduce((sum, a) => sum + a.amt, 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' TET';
            container.innerHTML = '';

            let surpluses = JSON.parse(JSON.stringify(surplusList)).sort((a,b) => b.amt - a.amt);
            
            let sortedShortages = JSON.parse(JSON.stringify(shortageList)).sort((a,b) => {
                if (a.day !== b.day) return a.day - b.day;
                return b.amt - a.amt;
            });
            
            sortedShortages.forEach(short => {
                let needed = short.amt;
                let dayStr = t('shortage_at_day').replace('{d}', short.day);
                
                let header = document.createElement('div');
                header.className = "text-sm text-slate-800 border-b border-slate-100 pb-3 mb-1";
                header.innerHTML = t('rescue_req')
                    .replace('{name}', short.name)
                    .replace('{amt}', needed.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}))
                    .replace('{day}', dayStr);
                container.appendChild(header);

                let transfers = [];
                for (let i = 0; i < surpluses.length; i++) {
                    if (needed <= 0) break;
                    if (surpluses[i].amt > 0) {
                        let take = Math.min(surpluses[i].amt, needed);
                        surpluses[i].amt -= take;
                        needed -= take;
                        
                        let msg = t('rescue_action')
                            .replace('{src}', surpluses[i].name)
                            .replace('{amt}', take.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}))
                            .replace('{target}', short.name);
                        transfers.push(msg);
                    }
                }

                if (needed > 0.01) {
                    let warn = document.createElement('p');
                    warn.className = "text-xs text-rose-600 font-bold mt-2 bg-rose-50 border border-rose-100 p-3 rounded-xl flex items-center gap-2 shadow-sm";
                    warn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> 
                                      <span>${t('rescue_unavailable')} (还差 <strong class="font-black text-rose-700">${needed.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})} TET</strong>)</span>`;
                    container.appendChild(warn);
                }

                if (transfers.length > 0) {
                    let transferList = document.createElement('div');
                    transferList.className = "mt-2 space-y-2";
                    transfers.forEach(txt => {
                        let p = document.createElement('p');
                        p.className = "text-xs text-slate-600 flex items-start gap-2 p-2.5 rounded-lg bg-slate-50 border border-slate-100";
                        p.innerHTML = `<svg class="w-4 h-4 text-indigo-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg> <span>${txt}</span>`;
                        transferList.appendChild(p);
                    });
                    container.appendChild(transferList);
                }
            });
        }

        function renderChart(data) {
            const ctx = document.getElementById('ecosystemChart').getContext('2d');
            if (ecosystemChart) ecosystemChart.destroy();

            let labels = [];
            for(let i=1; i<=60; i++) labels.push(t('shortage_at_day').replace('{d}', i));

            let gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(99, 102, 241, 0.4)'); 
            gradient.addColorStop(1, 'rgba(99, 102, 241, 0.0)');

            ecosystemChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: t('total_wallets'),
                        data: data,
                        borderColor: '#6366f1',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4, 
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: '#6366f1',
                        pointHoverBorderColor: '#fff',
                        pointHoverBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { family: 'Inter', size: 12 },
                            bodyFont: { family: 'Inter', size: 14, weight: 'bold' },
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: false,
                            callbacks: {
                                label: function(context) { return context.parsed.y.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' TET'; }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: false, 
                            grid: { borderDash: [4, 4], color: '#f1f5f9' },
                            ticks: { font: { family: 'Inter' }, color: '#94a3b8' }
                        },
                        x: { 
                            grid: { display: false }, 
                            ticks: { maxTicksLimit: 8, font: { family: 'Inter' }, color: '#94a3b8' } 
                        }
                    }
                }
            });
        }

        window.onload = initApp;
    </script>
